name: Study Planner Environment

description: Reinforcement learning environment simulating student study behavior and productivity optimization.

version: 1.0

author: Sanjeev Kumar

license: MIT

actions:
  - study
  - rest
  - scroll

observation:
  energy: int
  progress: float
  focus: int
  time: int

reward:
  type: float
  range: [-10.0,10.0]

tasks:
  - name: easy
    target: 30
    difficulty: easy

  - name: medium
    target: 60
    difficulty: medium

  - name: hard
    target: 100
    difficulty: hard

endpoints:
  reset: /reset
  step: /step/{action}
  state: /state
  baseline: /baseline
  grader: /grader

project:
  name: study-planner-openenv
  description: AI Study Planner RL Environment
  homepage: https://huggingface.co/spaces/sanjeevku/study-planner-env
